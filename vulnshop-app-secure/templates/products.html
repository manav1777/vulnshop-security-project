{% extends "base.html" %}
{% block title %}Products - VulnShop{% endblock %}
{% block content %}
<h2>Our Products</h2>
<div class="row mt-4">
    {% for product in products %}
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ product[1] }}</h5>
                <p class="card-text">{{ product[2] }}</p>
                <p class="text-muted">Category: {{ product[4] }}</p>
                <h4 class="text-primary">${{ "%.2f"|format(product[3]) }}</h4>
                <a href="/product/{{ product[0] }}" class="btn btn-primary">View Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
